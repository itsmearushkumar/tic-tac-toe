<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <!-- Title -->
        <h1>🎮 TIC TAC TOE</h1>
        <p class="subtitle">Play Smart. Win Fast.</p>
        <div class="mode-select">
    <button id="pvpBtn" class="mode-btn active">👥 Player vs Player</button>
    <button id="aiBtn" class="mode-btn">🤖 Play vs AI</button>
</div>

        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="score x-score">
                X<br><span id="scoreX">0</span>
            </div>
            <div class="score o-score">
                O<br><span id="scoreO">0</span>
            </div>
        </div>

        <!-- Game Board -->
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <!-- Status -->
        <h2 id="status">Player X Turn</h2>

        <!-- Restart Button -->
        <button onclick="restartGame()">Restart Game</button>

    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
